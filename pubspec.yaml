name: event_hub
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2  
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  provider: ^6.1.5+1
  animated_toggle_switch: ^0.8.7
  image_picker: ^1.2.1
  path: ^1.9.1
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0
  permission_handler: ^12.0.1
  gal: ^2.3.2
  google_maps_flutter: ^2.15.0
  geolocator: ^10.1.0
  dio: ^5.9.2
  location: ^5.0.0
  shared_preferences: ^2.5.5
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  http: ^1.6.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/image/
    - assets/font/
    - assets/image/photo_profile.png
    - assets/map_style/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/font/Cairo-Regular.ttf
          weight: 400
        - asset: assets/font/Cairo-Medium.ttf
          weight: 500
        - asset: assets/font/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/font/Cairo-Bold.ttf
          weight: 700
